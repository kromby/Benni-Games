<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klesstann Rally</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="top-bar">
    <a href="../../" class="back-link">&larr; Til baka</a>
    <span class="game-title">Klesstann Rally</span>
    <span id="lap-counter" class="lap-counter">Hring 1 af 2</span>
  </header>

  <!-- Home View (per D-06) -->
  <div id="home-view" class="home-view">
    <div class="home-cards">
      <div class="home-card">
        <h2>B&iacute;llinn</h2>
        <div class="stat-grid">
          <div class="stat-item">
            <span class="stat-emoji">&#x2699;&#xFE0F;</span>
            <span class="stat-value" id="stat-engine">Stig 0</span>
            <span class="stat-sub" id="stat-engine-range">1&ndash;3 skref</span>
            <span class="stat-label">V&eacute;l</span>
          </div>
          <div class="stat-item">
            <span class="stat-emoji">&#x1F6DE;</span>
            <span class="stat-value" id="stat-tires">Stig 0</span>
            <span class="stat-sub" id="stat-tires-chance">50% h&aelig;ging</span>
            <span class="stat-label">Dekk</span>
          </div>
        </div>
      </div>
      <div class="home-card">
        <h2>Ferill</h2>
        <div class="stat-grid medals-grid">
          <div class="stat-item">
            <span class="stat-emoji">&#x1F947;</span>
            <span class="stat-value" id="stat-gold">0</span>
            <span class="stat-label">Gull</span>
          </div>
          <div class="stat-item">
            <span class="stat-emoji">&#x1F948;</span>
            <span class="stat-value" id="stat-silver">0</span>
            <span class="stat-label">Silfur</span>
          </div>
          <div class="stat-item">
            <span class="stat-emoji">&#x1F949;</span>
            <span class="stat-value" id="stat-bronze">0</span>
            <span class="stat-label">Brons</span>
          </div>
        </div>
        <div class="stat-grid race-grid">
          <div class="stat-item">
            <span class="stat-value" id="stat-races">0</span>
            <span class="stat-label">Keppnir</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" id="stat-earned">0 kr.</span>
            <span class="stat-label">Unni&eth;</span>
          </div>
        </div>
      </div>
    </div>
    <div class="home-actions">
      <button id="go-shop-btn" class="home-btn">&#x1F6E0;&#xFE0F; Verkst&aelig;&eth;i</button>
      <button id="go-race-btn" class="home-btn home-btn-primary">&#x1F3C1; Keppa!</button>
    </div>
  </div>

  <!-- Shop View (per D-04) -->
  <div id="shop-view" class="shop-view hidden">
    <div class="shop-cards">
      <div class="shop-card" id="shop-card-engine">
        <h3>&#x2699;&#xFE0F; V&eacute;l</h3>
        <div class="shop-current" id="shop-engine-current"></div>
        <div class="shop-next" id="shop-engine-next"></div>
        <button class="shop-buy-btn" id="buy-engine-btn">Kaupa</button>
      </div>
      <div class="shop-card" id="shop-card-tires">
        <h3>&#x1F6DE; Dekk</h3>
        <div class="shop-current" id="shop-tires-current"></div>
        <div class="shop-next" id="shop-tires-next"></div>
        <button class="shop-buy-btn" id="buy-tires-btn">Kaupa</button>
      </div>
    </div>
    <div class="home-actions">
      <button id="shop-home-btn" class="home-btn">Heim</button>
      <button id="shop-race-btn" class="home-btn home-btn-primary">&#x1F3C1; Keppa!</button>
    </div>
  </div>

  <main id="track-board" class="hidden">
    <!-- 20 track-space divs rendered by JS via TRACK_COORDS -->
  </main>

  <aside id="standings-panel" class="hidden">
    <h2>Sta&eth;a</h2>
    <div class="standings-header">
      <span class="sh-pos">S&aelig;ti</span>
      <span class="sh-driver">Keppandi</span>
      <span class="sh-lap">Hringur</span>
    </div>
    <div id="standings-list">
      <!-- 4 rows rendered by JS -->
    </div>
  </aside>

  <div id="roll-area" class="hidden">
    <button id="roll-btn">Keyra!</button>
    <div id="dice-result"></div>
  </div>

  <div id="results-screen" class="hidden">
    <div class="results-inner">
      <h2>Lokani&eth;ursta&eth;an</h2>
      <div id="results-list"></div>
      <button id="home-btn-results" class="home-btn home-btn-primary">Heim</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
