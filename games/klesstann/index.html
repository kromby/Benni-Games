<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klesstann</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="top-bar">
    <a href="../../" class="back-link">← Til baka</a>
    <img src="images/logo.png" alt="Klesstann" class="logo">
    <div class="money-display">💰 <span id="money-display">0</span> kr.</div>
  </header>

  <aside id="left-panel">
    <section id="stats-panel">
      <h2>Tölfræði</h2>
      <table id="stats-table">
        <tr data-stat="hradi"><td>🏎️ Hraði</td><td class="stat-bar-cell"><div class="stat-bar"><div class="stat-fill"></div></div></td><td class="stat-value">0</td></tr>
        <tr data-stat="kraftur"><td>💪 Kraftur</td><td class="stat-bar-cell"><div class="stat-bar"><div class="stat-fill"></div></div></td><td class="stat-value">0</td></tr>
        <tr data-stat="vopnastyrkur"><td>🔫 Vopnastyrkur</td><td class="stat-bar-cell"><div class="stat-bar"><div class="stat-fill"></div></div></td><td class="stat-value">0</td></tr>
        <tr data-stat="thol"><td>🛡️ Þol</td><td class="stat-bar-cell"><div class="stat-bar"><div class="stat-fill"></div></div></td><td class="stat-value">0</td></tr>
        <tr data-stat="stjornun"><td>🎯 Stjórnun</td><td class="stat-bar-cell"><div class="stat-bar"><div class="stat-fill"></div></div></td><td class="stat-value">0</td></tr>
      </table>
    </section>

    <section id="inventory-panel">
      <h2>Hlutir</h2>
      <div id="inventory-list"></div>
    </section>
  </aside>

  <main id="car-grid"></main>

  <aside id="shop-panel">
    <h2>Verslun</h2>
    <div id="shop-grid" class="shop-grid"></div>
  </aside>

  <button id="reset-btn" class="reset-btn" title="Byrja upp á nýtt">🔄</button>

  <script src="game.js"></script>
</body>
</html>
